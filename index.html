    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.groq.com https://api.anthropic.com https://api.openai.com http://localhost:11434 https:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />
    <title>AAISM Study App - AI Security Manager Exam Prep</title>
    <script>
      // GitHub Pages SPA: restore route from 404.html redirect
      (function () {
        var params = new URLSearchParams(window.location.search);
        var path = params.get('p');
        if (path) {
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, '', base + path);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
