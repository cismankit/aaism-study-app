<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#grad1)"/>
  
  <!-- AI Brain Network -->
  <g fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
    <!-- Central node -->
    <circle cx="24" cy="24" r="4" fill="white" fill-opacity="0.9"/>
    
    <!-- Outer nodes -->
    <circle cx="14" cy="16" r="2.5" fill="white" fill-opacity="0.7"/>
    <circle cx="34" cy="16" r="2.5" fill="white" fill-opacity="0.7"/>
    <circle cx="12" cy="28" r="2.5" fill="white" fill-opacity="0.7"/>
    <circle cx="36" cy="28" r="2.5" fill="white" fill-opacity="0.7"/>
    <circle cx="18" cy="36" r="2.5" fill="white" fill-opacity="0.7"/>
    <circle cx="30" cy="36" r="2.5" fill="white" fill-opacity="0.7"/>
    
    <!-- Connections -->
    <line x1="21" y1="21" x2="16" y2="17" stroke-opacity="0.6"/>
    <line x1="27" y1="21" x2="32" y2="17" stroke-opacity="0.6"/>
    <line x1="20" y1="24" x2="14" y2="27" stroke-opacity="0.6"/>
    <line x1="28" y1="24" x2="34" y2="27" stroke-opacity="0.6"/>
    <line x1="22" y1="27" x2="19" y2="34" stroke-opacity="0.6"/>
    <line x1="26" y1="27" x2="29" y2="34" stroke-opacity="0.6"/>
    
    <!-- Cross connections -->
    <line x1="16" y1="17" x2="13" y2="26" stroke-opacity="0.3"/>
    <line x1="32" y1="17" x2="35" y2="26" stroke-opacity="0.3"/>
    <line x1="14" y1="29" x2="17" y2="34" stroke-opacity="0.3"/>
    <line x1="34" y1="29" x2="31" y2="34" stroke-opacity="0.3"/>
  </g>
  
  <!-- Pulse ring -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.3"/>
</svg>
